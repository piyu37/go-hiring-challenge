name: Go

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Unit tests with coverage
        run: |
          go test -v -count=1 -race \
            -coverprofile=coverage.unit.out -covermode=atomic \
            -coverpkg=github.com/mytheresa/go-hiring-challenge/... \
            ./app/api ./app/catalog ./app/categories ./app/config ./app/health ./app/middleware ./models

      - name: Print unit test coverage
        run: |
          echo "=== Unit test coverage ==="
          go tool cover -func=coverage.unit.out
          echo ""
          go tool cover -func=coverage.unit.out | tail -1

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.unit.out

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
          POSTGRES_DB: challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HTTP_PORT: "8484"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: challenge
      POSTGRES_SQL_DIR: ./sql

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Integration tests with coverage
        run: |
          go test -v -count=1 -tags=integration ./models/... \
            -coverprofile=coverage.integration.out -covermode=atomic \
            -coverpkg=github.com/mytheresa/go-hiring-challenge/...

      - name: Print integration test coverage
        run: |
          echo "=== Integration test coverage ==="
          go tool cover -func=coverage.integration.out
          echo ""
          go tool cover -func=coverage.integration.out | tail -1

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.integration.out

  coverage:
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Merge and print combined coverage
        run: |
          go run github.com/wadey/gocovmerge@latest \
            coverage.unit.out coverage.integration.out > coverage.out
          echo "=== Combined unit + integration coverage ==="
          go tool cover -func=coverage.out
          echo ""
          go tool cover -func=coverage.out | tail -1

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage.out
